  <body>
    <div id="root"></div>
    
    <!-- Service Worker: desabilitado. Remove qualquer SW existente. -->
    <script>
      if ('serviceWorker' in navigator) {
        // Força desregistrar qualquer SW ativo imediatamente
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister();
            console.log('[SW] Desregistrado:', registrations[i].scope);
          }
        }).catch(function(err) {
          console.log('[SW] Erro ao desregistrar:', err);
        });
      }
    </script>
  </body>
