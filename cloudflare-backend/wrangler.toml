name = "sendmessage-backend"
main = "src/index.ts"
compatibility_date = "2026-03-28"
compatibility_flags = [ "nodejs_compat" ]

[observability.logs]
enabled = true

[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "sendmessage-uploads"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "aa4d950b0ebd4d7b86b39e689a665876"

[vars]
SYSTEM_TIMEZONE = "America/Sao_Paulo"
SYSTEM_TIMEZONE_LABEL = "GMT-3 (America/Sao_Paulo)"
ACTIVE_USER_WINDOW_SECONDS = "120"
WARMER_CRON_ENABLED = "false"

[triggers]
crons = [ "* * * * *" ]
